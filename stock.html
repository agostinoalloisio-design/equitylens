<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#0b0f14;
color:white;
}

header{
padding:15px 30px;
background:#111827;
display:flex;
justify-content:space-between;
border-bottom:1px solid #1f2937;
}

.container{
padding:30px;
}

#chart{
height:420px;
margin-top:20px;
}

.card{
background:#111827;
padding:15px;
margin-top:20px;
border-radius:12px;
border:1px solid #1f2937;
}
</style>
</head>

<body>

<header>
<div>EquityLens</div>
<div id="symbol">STOCK</div>
</header>

<div class="container">

<h2 id="title">Loading...</h2>

<div id="chart"></div>

<div class="card">
<h3>AI Insight</h3>
<p id="ai">Loading analysis...</p>
</div>

</div>

<script>

let chart;
let series;
let price = 100;

const params = new URLSearchParams(window.location.search);
const symbol = params.get("symbol") || "AAPL";

document.getElementById("title").innerText = symbol;
document.getElementById("symbol").innerText = symbol;

function initChart(){

chart = LightweightCharts.createChart(document.getElementById("chart"), {
layout:{background:{color:"#0b0f14"}, textColor:"white"},
grid:{vertLines:{color:"#1f2937"}, horzLines:{color:"#1f2937"}}
});

series = chart.addCandlestickSeries();

let data = [];

for(let i=0;i<30;i++){
let open = price;
let close = price + (Math.random()-0.5)*5;
let high = Math.max(open,close)+Math.random()*2;
let low = Math.min(open,close)-Math.random()*2;

data.push({
time: 1700000000+i*86400,
open, high, low, close
});

price = close;
}

series.setData(data);
chart.timeScale().fitContent();
}

function liveUpdate(){

setInterval(()=>{
price += (Math.random()-0.5)*1.5;

const candle = {
time: Math.floor(Date.now()/1000),
open: price,
high: price+1,
low: price-1,
close: price
};

series.update(candle);

},2000);
}

initChart();
liveUpdate();

document.getElementById("ai").innerText =
symbol + " mostra forte interesse retail e momentum nel settore tech.";

</script>

</body>
</html>
