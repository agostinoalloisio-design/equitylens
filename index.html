<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EquityLens</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0b0f14;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:#111827;
border-bottom:1px solid #1f2937;
}

.logo{
color:#3b82f6;
font-weight:700;
}

nav a{
color:#9ca3af;
margin-left:20px;
text-decoration:none;
}

.hero{
padding:70px 50px;
}

.hero h1{
font-size:52px;
margin-bottom:10px;
}

.hero p{
color:#9ca3af;
font-size:18px;
max-width:600px;
}

.buttons{
margin-top:25px;
display:flex;
gap:15px;
}

.btn{
padding:12px 18px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:600;
}

.primary{background:#3b82f6;color:white;}
.secondary{background:#111827;color:white;border:1px solid #1f2937;}

.market{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
padding:40px 50px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
border:1px solid #1f2937;
}

.green{color:#10b981;}
.red{color:#ef4444;}

footer{
padding:30px;
text-align:center;
color:#6b7280;
border-top:1px solid #1f2937;
}
</style>

</head>

<body>

<header>
<div class="logo">EquityLens</div>

<nav>
<a href="index.html">Home</a>
<a href="market.html">Markets</a>
<a href="stock.html">Stock</a>
</nav>
</header>

<section class="hero">
<h1>Smarter Investing Starts Here</h1>
<p>
Analisi azioni, settori, sentiment e punteggi fondamentali in un’unica piattaforma.
</p>

<div class="buttons">
<button class="btn primary" onclick="location.href='market.html'">Explore Market</button>
<button class="btn secondary" onclick="location.href='stock.html'">Stock Analysis</button>
</div>
</section>

<section class="market">

<div class="card"><h3>S&P500</h3><p class="green">+0.8%</p></div>
<div class="card"><h3>NASDAQ</h3><p class="green">+1.2%</p></div>
<div class="card"><h3>BTC</h3><p class="green">+2.4%</p></div>
<div class="card"><h3>EUR/USD</h3><p class="red">-0.2%</p></div>

</section>

<footer>© EquityLens</footer>

</body>
</html>
