<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EquityLens</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#0b0f14;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
padding:18px 40px;
background:#111827;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
}

.logo{
color:#3b82f6;
font-weight:700;
}

nav a{
color:#9ca3af;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:white;
}

.hero{
padding:60px 40px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
color:#9ca3af;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:40px;
}

.card{
background:#111827;
padding:18px;
border-radius:12px;
border:1px solid #1f2937;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-3px);
border-color:#3b82f6;
}

.green{color:#10b981;}
.red{color:#ef4444;}

.market{
padding:0 40px 40px;
}

</style>
</head>

<body>

<header>
<div class="logo">EquityLens</div>

<nav>
<a href="#">Home</a>
<a href="#market">Market</a>
<a href="stock.html">Stocks</a>
<a href="#">Premium</a>
</nav>
</header>

<section class="hero">
<h1>Investing Intelligence Platform</h1>
<p>Analisi azioni, dati di mercato e insight in tempo reale.</p>
</section>

<section id="market" class="grid">

<div class="card" onclick="openStock('AAPL')">
<h3>AAPL</h3>
<p class="green" id="aapl">+0.00%</p>
</div>

<div class="card" onclick="openStock('TSLA')">
<h3>TSLA</h3>
<p class="green" id="tsla">+0.00%</p>
</div>

<div class="card" onclick="openStock('NVDA')">
<h3>NVDA</h3>
<p class="green" id="nvda">+0.00%</p>
</div>

<div class="card" onclick="openStock('MSFT')">
<h3>MSFT</h3>
<p class="green" id="msft">+0.00%</p>
</div>

</section>

<script>
function openStock(symbol){
window.location.href = "stock.html?symbol=" + symbol;
}

// fake live updates
function randomChange(){
const stocks = ["aapl","tsla","nvda","msft"];

stocks.forEach(s=>{
let val = (Math.random()*2-1).toFixed(2);
document.getElementById(s).innerText = val + "%";
document.getElementById(s).style.color = val>=0 ? "#10b981":"#ef4444";
});
}

setInterval(randomChange, 2000);
</script>

</body>
</html>
