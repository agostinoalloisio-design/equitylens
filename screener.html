<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EquityLens Screener</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{
background:#0b0f14;
color:white;
  <h1 style="color:red">NUOVO SCREENER EQUITYLENS</h1>
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 30px;
background:#111827;
border-bottom:1px solid #1f2937;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:#3b82f6;
font-weight:700;
}

nav{
display:flex;
gap:10px;
flex-wrap:wrap;
}

nav a{
color:#9ca3af;
text-decoration:none;
font-size:13px;
padding:6px 10px;
border-radius:8px;
}

nav a:hover{
background:#1f2937;
color:white;
}

/* LAYOUT */
.container{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:230px;
padding:20px;
border-right:1px solid #1f2937;
min-height:100vh;
}

.sector{
padding:10px;
margin-bottom:8px;
background:#111827;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.sector:hover{
background:#1f2937;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #1f2937;
font-size:13px;
text-align:left;
}

th{
color:#9ca3af;
}

tr:hover{
background:#111827;
cursor:pointer;
}

/* COLORS */
.green{color:#10b981;font-weight:600;}
.yellow{color:#fbbf24;font-weight:600;}
.red{color:#ef4444;font-weight:600;}

</style>
</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">EquityLens</div>

<nav>
<a href="index.html">Home</a>
<a href="screener.html">Screener</a>
<a href="news.html">News</a>
<a href="groups.html">Groups</a>
<a href="futures.html">Futures</a>
<a href="forex.html">Forex</a>
<a href="crypto.html">Crypto</a>
</nav>

</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="sector" onclick="filter('all')">📊 All</div>
<div class="sector" onclick="filter('Tech')">💻 Tech</div>
<div class="sector" onclick="filter('Finance')">🏦 Finance</div>
<div class="sector" onclick="filter('Health')">🧬 Health</div>
<div class="sector" onclick="filter('Energy')">⚡ Energy</div>
<div class="sector" onclick="filter('Consumer')">🛒 Consumer</div>

</div>

<!-- MAIN -->
<div class="main">

<table>

<thead>
<tr>
<th>Ticker</th>
<th>Azienda</th>
<th>Settore</th>
<th>Prezzo</th>
<th>Fund</th>
<th>Tech</th>
<th>Mom</th>
<th>Sent</th>
<th>Score</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

const API = "INSERISCI_LA_TUA_API_KEY";

let filterState = "all";

const stocks = [
{t:"NVDA",n:"NVIDIA",s:"Tech"},
{t:"MSFT",n:"Microsoft",s:"Tech"},
{t:"AAPL",n:"Apple",s:"Tech"},
{t:"GOOGL",n:"Google",s:"Tech"},
{t:"META",n:"Meta",s:"Tech"},
{t:"AMD",n:"AMD",s:"Tech"},

{t:"JPM",n:"JPMorgan",s:"Finance"},
{t:"V",n:"Visa",s:"Finance"},
{t:"MA",n:"Mastercard",s:"Finance"},
{t:"GS",n:"Goldman",s:"Finance"},

{t:"JNJ",n:"Johnson",s:"Health"},
{t:"PFE",n:"Pfizer",s:"Health"},
{t:"UNH",n:"UnitedHealth",s:"Health"},

{t:"XOM",n:"Exxon",s:"Energy"},
{t:"CVX",n:"Chevron",s:"Energy"},

{t:"AMZN",n:"Amazon",s:"Consumer"},
{t:"TSLA",n:"Tesla",s:"Consumer"},
{t:"NKE",n:"Nike",s:"Consumer"},
{t:"MCD",n:"McDonalds",s:"Consumer"},
];

// prezzi live cache
let priceData = {};

async function loadPrice(symbol){

try{

const r = await fetch(
`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${API}`
);

const d = await r.json();

priceData[symbol] = d.c;

}catch(e){

priceData[symbol] = null;

}

}

function score(){
return Math.floor(70 + Math.random()*25);
}

function color(v){
if(v>=85) return "green";
if(v>=70) return "yellow";
return "red";
}

async function render(){

const table = document.getElementById("table");
table.innerHTML = "";

// carica prezzi
for(let s of stocks){
await loadPrice(s.t);
}

stocks
.filter(s => filterState==="all" || s.s===filterState)
.forEach(s=>{

let p = priceData[s.t] || 0;

let sc = score();

table.innerHTML += `
<tr onclick="openStock('${s.t}')">
<td>${s.t}</td>
<td>${s.n}</td>
<td>${s.s}</td>
<td>$ ${p.toFixed(2)}</td>
<td class="${color(sc)}">${sc}</td>
<td class="${color(sc-3)}">${sc-3}</td>
<td class="${color(sc+2)}">${sc+2}</td>
<td class="${color(sc-1)}">${sc-1}</td>
<td class="${color(sc)}">${sc}</td>
</tr>
`;

});

}

function filter(f){
filterState = f;
render();
}

function openStock(t){
window.location.href = "stock.html?ticker=" + t;
}

// auto refresh
render();
setInterval(render, 20000);

</script>

</body>
</html>
</body>
</html>
